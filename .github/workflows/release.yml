name: release
on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-phase*"

jobs:
  build-runtime-sidecar:
    name: build runtime sidecar (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Build sidecar with PyInstaller
        run: |
          uv run python scripts/release/build-sidecar.py --output dist/sidecar
        env:
          OS_TARGET: ${{ runner.os }}

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: cw-runtime-sidecar-${{ runner.os }}
          path: dist/sidecar/*

  build-electron:
    name: build Electron installer (${{ matrix.os }})
    needs: build-runtime-sidecar
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Download sidecar artifact
        uses: actions/download-artifact@v4
        with:
          name: cw-runtime-sidecar-${{ runner.os }}
          path: apps/desktop/resources/runtime

      - name: Build Electron installer
        run: pnpm --filter @cw/desktop run build
        env:
          # 触发 electron-builder 平台原生格式：Win NSIS / mac dmg / Linux AppImage
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: cw-installer-${{ runner.os }}
          path: apps/desktop/dist/installer/*

  publish-github-release:
    name: publish GitHub Release
    needs: build-electron
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: dist/installers

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist/installers/**/*
          prerelease: ${{ contains(github.ref_name, '-phase') || contains(github.ref_name, '-rc') }}
