[project]
name = "cw_schemas"
version = "0.1.0"
description = "CognitiveWorkflow shared Pydantic v2 schemas (single source of truth, ADR-0003)"
requires-python = ">=3.11,<3.13"
license = { text = "MIT" }
authors = [{ name = "CW Architecture" }]
readme = "README.md"

# 强约束：本包是 leaf package（ADR-0003 §3 决定）
# - 仅依赖 pydantic v2
# - 严禁依赖 cw_runtime / pydantic-ai / fastapi 等运行时库
dependencies = [
    "pydantic>=2.10.0",
]

[project.optional-dependencies]
codegen = [
    "datamodel-code-generator>=0.28.0",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cw_schemas"]

[tool.hatch.build.targets.sdist]
include = ["src/cw_schemas", "tests", "README.md"]
